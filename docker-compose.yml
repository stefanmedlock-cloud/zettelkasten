version: "3.8"
services:
  zettelkasten-master:
    build: .
    ports:
      - "8080:8080"
      - "8000:8000"
      - "9080:9080"
    volumes:
      - master_data:/app/data
    command: ["zettelkasten", "run-server", "--host", "0.0.0.0", "--port", "8080", "--web-port", "8000", "--db", "/app/data/master.db", "--backend", "sqlite", "--role", "master"]

  zettelkasten-replica:
    build: .
    ports:
      - "8081:8080"
      - "8001:8000"
    volumes:
      - replica_data:/app/data
    depends_on:
      - zettelkasten-master
    command: ["zettelkasten", "run-server", "--host", "0.0.0.0", "--port", "8080", "--web-port", "8000", "--db", "/app/data/replica.db", "--backend", "sqlite", "--role", "replica", "--master-addr", "zettelkasten-master:9080"]

volumes:
  master_data:
  replica_data:
